<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Snowflake Rapids Rafting LLC</title>
    <meta name="description"
      content="Contact Information including the administrators of fun">
    <meta name="author" content="Neal Kammeyer">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="contact-page">
    <header>
        <img src="images/z-therapidssplash.jpg" alt="White Water Rafting logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>Snowflake Rapids Rafting LLC</h1>
            <p>1875 Canyon Dr.</p>
            <p>Snowflake, AZ 85937</p>
            <p>1(928)555-1212</p>
            <p>info@snowflakerapidsrafting.com</p>
        </section>
        <div class="contact-layout">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3288.0150353248373!2d-110.1116403!3d34.5025031!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x872f3cebe18b3751%3A0x3c083e4f9be55053!2s1875%20Canyon%20Dr%2C%20Snowflake%2C%20AZ%2085937!5e0!3m2!1sen!2sus!4v1775190221701!5m2!1sen!2sus" 
                    title="Snowflake Rapids Rafting location map"
                    width="400" 
                    height="300" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
                
            <form class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                 
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general inquiry">
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation question">
                    Reservation Question
                </label>

                <label for="website">
                    <input type="radio" id="website" name="purpose" value="website suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message: </label>
                <textarea id="message" name="message" rows="3"></textarea>
                
                <label for="subscribe" class="checkbox-label">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please add me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>
        </div>
       
        <section class="employees">
            <h2>Meet The Administrators Of Fun</h2>
            <figure>
                <img src="images/neal.jpg" alt="Neal">
                <figcaption>Neal - Founder / CEO</figcaption>
            </figure>
            <figure>
                <img src="images/john.jpg" alt="John">
                <figcaption>John - Marketing Director</figcaption>
            </figure>
            <figure>
                <img src="images/dee.jpg" alt="Dee">
                <figcaption>Dee - Office Manager</figcaption>
            </figure>
            <figure>
                <img src="images/robert.jpg" alt="Robert">
                <figcaption>Robert - Rapids Leader</figcaption>
            </figure>
            <figure>
                <img src="images/becca.jpg" alt="Becca">
                <figcaption>Becca - Rapids Leader</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>© 2026 | Snowflake Rapids LLC | Neal Kammeyer</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon"></a>
            <a href="https://www.instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon"></a>
            <a href="https://www.x.com">
                <img src="images/x.jpg" alt="X Icon"></a>

        </nav>
    </footer>
</body>

</html>
